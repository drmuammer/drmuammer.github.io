project:
  type: website
  output-dir: _site
  resources:
    - "CNAME"
    - ".nojekyll"
    - "assets/**"

website:
  title: "Muammer Beslen"
  description: "Saha epidemiyologu ve hekim. Klinik araştırma, biyoistatistik, nedensel çıkarım üzerine notlar ve açık kaynak Türkçe rehberler."
  site-url: https://muammerbeslen.com
  favicon: assets/favicon.svg
  open-graph: true
  twitter-card: false
  search: false
  page-navigation: false
  back-to-top-navigation: true
  reader-mode: false

  navbar:
    background: "#FAF7F2"
    foreground: "#2D2418"
    pinned: true
    collapse-below: lg
    logo: assets/brand/tulumba-deep.svg
    logo-alt: "Muammer Beslen"
    left:
      - text: "Hakkımda"
        href: hakkimda.qmd
      - text: "Notlar"
        href: notlar.qmd
      - text: "Projeler"
        href: projeler.qmd
      - text: "İletişim"
        href: iletisim.qmd

  page-footer:
    background: "#2D2418"
    foreground: "#9B8A6F"
    border: false
    left: |
      © 2026 Muammer Beslen
    center: |
      [Hakkımda](/hakkimda.html) · [Notlar](/notlar.html) · [Projeler](/projeler.html) · [İletişim](/iletisim.html)
    right: |
      [GitHub](https://github.com/drmuammer) · [LinkedIn](https://www.linkedin.com/in/muammer-beslen-78a59622b)

format:
  html:
    theme:
      - cosmo
      - assets/custom.scss
    css: assets/custom.css
    toc: false
    anchor-sections: false
    smooth-scroll: true
    lang: tr
    fontsize: "17px"
    linkcolor: "#7A5C3A"
    include-in-header:
      - _includes/analytics.html
      - text: |
          <link rel="preconnect" href="https://fonts.googleapis.com">
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
          <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
